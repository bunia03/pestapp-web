<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0B0F16" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PestApp" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>PestApp</title>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="utility-row">
        <div class="utility-left">
          <div class="tab-row top-tabs" id="list-tabs"></div>
        </div>
        <div class="utility-right">
          <button id="search-toggle" class="icon-button" aria-label="Szukaj">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6.5"></circle>
              <path d="M16 16l5 5"></path>
            </svg>
          </button>
          <button id="calendar-toggle" class="icon-button" aria-label="Kalendarz">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="5" width="16" height="15" rx="2"></rect>
              <path d="M8 3v4M16 3v4M4 9h16"></path>
            </svg>
          </button>
          <div class="settings-wrap">
            <button id="settings-toggle" class="icon-button" aria-label="Ustawienia">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3l1.2 2.4 2.7.4-.8 2.6 1.8 2-1.8 2 .8 2.6-2.7.4L12 21l-1.2-2.4-2.7-.4.8-2.6-1.8-2 1.8-2-.8-2.6 2.7-.4L12 3z"></path>
                <circle cx="12" cy="12" r="3.2"></circle>
              </svg>
            </button>
            <div id="settings-menu" class="settings-menu hidden">
              <button id="refresh-data" class="ghost">Odśwież</button>
              <button id="export-backup" class="ghost">Pobierz backup</button>
              <button id="reset-password" class="ghost">Odzyskaj hasło</button>
              <button id="sign-out" class="ghost">Wyloguj</button>
            </div>
          </div>
        </div>
      </div>
      <div id="search-row" class="search-row hidden">
        <input id="search" type="search" placeholder="Szukaj…" />
      </div>
    </header>

    <section class="auth-bar" id="auth-bar">
      <div class="auth-fields">
        <input id="auth-email" type="email" placeholder="Twój e-mail do synchronizacji" />
        <input id="auth-password" type="password" placeholder="Hasło" />
        <button id="sign-in" class="ghost">Zaloguj</button>
        <button id="register" class="ghost">Załóż konto</button>
      </div>
      <div id="auth-status" class="auth-status"></div>
    </section>

    <div class="owner-tabs" id="owner-tabs"></div>

    <section class="controls">
      <div class="input-row">
        <input id="new-note" type="text" placeholder="Dodaj notatkę… (np. 16.03 raport lub !pilne)" />
        <button id="add-note" class="primary">Dodaj</button>
      </div>
      <div id="edit-row" class="edit-row hidden">
        <input id="edit-note-text" type="text" placeholder="Edytuj notatkę…" />
        <input id="edit-note-date" type="date" />
        <label class="inline-check">
          <input id="edit-note-urgent" type="checkbox" />
          <span>Pilne</span>
        </label>
        <label class="inline-check">
          <input id="edit-note-done" type="checkbox" />
          <span>Done</span>
        </label>
        <button id="edit-note-clear-date" class="ghost">Usuń datę</button>
        <button id="edit-note-save" class="primary">Zapisz</button>
        <button id="edit-note-cancel" class="ghost">Anuluj</button>
      </div>
    </section>

    <div class="main">
      <section class="notes">
        <div class="select-all" id="select-all-row"></div>
        <div class="bulk-actions" id="bulk-actions"></div>
        <div id="notes-list"></div>
        <div id="empty" class="empty"></div>
      </section>

      <aside class="calendar-panel" id="calendar-panel"></aside>
    </div>
  </div>

  <dialog id="calendar-dialog" class="calendar-dialog">
    <div class="calendar-dialog-header">
      <h3>Kalendarz</h3>
      <button id="close-calendar" class="ghost">Zamknij</button>
    </div>
    <div id="calendar-modal-body"></div>
  </dialog>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
