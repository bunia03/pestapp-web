<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0B0F16" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PestApp" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>PestApp</title>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="utility-row">
        <button id="search-toggle" class="icon-button" aria-label="Szukaj">⌕</button>
        <button id="calendar-toggle" class="icon-button" aria-label="Kalendarz">▦</button>
        <div class="settings-wrap">
          <button id="settings-toggle" class="icon-button" aria-label="Ustawienia">⚙</button>
          <div id="settings-menu" class="settings-menu hidden">
            <button id="refresh-data" class="ghost">Odśwież</button>
            <button id="reset-password" class="ghost">Odzyskaj hasło</button>
            <button id="sign-out" class="ghost">Wyloguj</button>
          </div>
        </div>
      </div>
      <div id="search-row" class="search-row hidden">
        <input id="search" type="search" placeholder="Szukaj…" />
      </div>
    </header>

    <section class="auth-bar" id="auth-bar">
      <div class="auth-fields">
        <input id="auth-email" type="email" placeholder="Twój e-mail do synchronizacji" />
        <input id="auth-password" type="password" placeholder="Hasło" />
        <button id="sign-in" class="ghost">Zaloguj</button>
        <button id="register" class="ghost">Załóż konto</button>
      </div>
      <div id="auth-status" class="auth-status"></div>
    </section>

    <div class="owner-tabs" id="owner-tabs"></div>

    <section class="controls">
      <div class="input-row">
        <input id="new-note" type="text" placeholder="Dodaj notatkę… (np. 16.03 raport lub !pilne)" />
        <button id="add-note" class="primary">Dodaj</button>
      </div>
      <div class="filters">
        <div class="filter-left">
          <label>Filtr</label>
          <select id="filter">
            <option value="all">Wszystkie</option>
            <option value="today">Dzisiaj</option>
            <option value="week">Tydzień</option>
            <option value="month">Miesiąc</option>
            <option value="date">Data</option>
          </select>
          <input id="filter-date" type="date" />
          <input id="filter-month" type="month" />
        </div>
        <div class="tab-row" id="list-tabs"></div>
      </div>
    </section>

    <div class="main">
      <section class="notes">
        <div class="select-all" id="select-all-row"></div>
        <div class="bulk-actions" id="bulk-actions"></div>
        <div id="notes-list"></div>
        <div id="empty" class="empty"></div>
      </section>

      <aside class="calendar-panel" id="calendar-panel"></aside>
    </div>
  </div>

  <dialog id="calendar-dialog" class="calendar-dialog">
    <div class="calendar-dialog-header">
      <h3>Kalendarz</h3>
      <button id="close-calendar" class="ghost">Zamknij</button>
    </div>
    <div id="calendar-modal-body"></div>
  </dialog>

  <dialog id="note-dialog" class="note-dialog">
    <div class="calendar-dialog-header">
      <h3>Edytuj notatkę</h3>
      <button id="close-note-dialog" class="ghost">Zamknij</button>
    </div>
    <div class="note-dialog-body">
      <textarea id="note-dialog-text" rows="5" placeholder="Treść notatki"></textarea>
      <div class="note-dialog-row">
        <label class="dialog-checkbox">
          <input id="note-dialog-urgent" type="checkbox" />
          <span>Pilne</span>
        </label>
        <label class="dialog-checkbox">
          <input id="note-dialog-done" type="checkbox" />
          <span>Done</span>
        </label>
      </div>
      <div class="note-dialog-row">
        <input id="note-dialog-date" type="date" />
        <button id="note-dialog-clear-date" class="ghost">Usuń datę</button>
      </div>
      <div class="note-dialog-row">
        <button id="note-dialog-save" class="primary">Zapisz</button>
      </div>
    </div>
  </dialog>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
